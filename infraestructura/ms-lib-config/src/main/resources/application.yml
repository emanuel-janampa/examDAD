server:
  port: 8888

spring:
  application:
    name: ms-lib-config
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:./src/main/resources/config

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
