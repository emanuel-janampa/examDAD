server.port=8080
spring.application.name=ms-lib-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}s
management.endpoints.web.exposure.include=*

# ==========================
# MS-LIB-LIBROS
# ==========================

spring.cloud.gateway.routes[0].id=authors
spring.cloud.gateway.routes[0].uri=lb://ms-lib-libros
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/authors/**

spring.cloud.gateway.routes[1].id=categories
spring.cloud.gateway.routes[1].uri=lb://ms-lib-libros
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[2].id=books
spring.cloud.gateway.routes[2].uri=lb://ms-lib-libros
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/books/**

