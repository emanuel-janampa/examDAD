server.port=8082
spring.application.name=ms-lib-prestamos

spring.datasource.url=jdbc:mysql://mysql:3306/db_prestamos
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
management.endpoints.web.exposure.include=*

# Configuración global de Resilience4j para el Circuit Breaker
resilience4j.circuitbreaker.instances.booksCB.slidingWindowSize=5
resilience4j.circuitbreaker.instances.booksCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.booksCB.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.booksCB.permittedNumberOfCallsInHalfOpenState=2

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method